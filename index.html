html<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歡迎來到我的個人網站</title>
    <!-- 讓 Google 搜尋引擎認識你的關鍵字 -->
    <meta name="description" content="這是我的個人官方網站，分享我的作品集與聯絡資訊。">
    <meta name="keywords" content="個人網站, 作品集, 台灣">
    
    <style>
        body {
            font-family: "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        h1 { margin: 20px 0 10px 0; font-size: 24px; }
        p { color: #666; font-size: 16px; line-height: 1.6; }
    </style>
</head>
<body>

    <div class="card">
        <!-- 🔗 這裡請確定換成你剛剛上傳的英文照片名稱 -->
        <img src="my-photo.jpg" alt="我的個人照" class="avatar">
        
        <h1>你的名字 / 暱稱</h1>
        <p>歡迎來到我的個人網頁！這裡是我在網路上的小基地。目前網頁已經成功連線，且可以被搜尋引擎搜尋到了！</p>
    </div>

</body>
</html>
